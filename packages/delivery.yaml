  - us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/tidb-tools/package

image_definitions:
  sync_trunk_community: &sync_trunk_community
    description: "delivery the trunk branch community images."
    tags_regex:
      - ^(master|main)(-experiment)?$
    constant_tags: [nightly]
  sync_trunk_enterprise: &sync_trunk_enterprise
    description: delivery the trunk branch enterprise edition images.
    tags_regex:
      - ^(master|main)-enterprise$
  sync_nextgen: &sync_nextgen
    description: delivery nextgen images
    tags_regex:
      # - branch naming tags: <branch>-nextgen
      # - branch commit exact tags: <branch>-<short-git-sha>-nextgen
      # - semver tags: vX.Y.Z(-*)-nextgen
      # - semver tags: vX.Y.Z-nextgen.YYYYMM.N
      # - calendar-style nextgen tags: v26.3.1-nextgen / v26.3.1-2-g<sha>-nextgen
      #
      # we will not dup the tag with profile world.
      - ^(master|dedicated|cloud-engine)(-.*)?-nextgen$
      - ^release-nextgen(-[-0-9a-f]+)?$ # nextgen release branches
      - ^feature-fts(-[-0-9a-f]+)?-nextgen$ # feature branches
      - ^v[0-9]+[.][0-9]+[.][0-9]+-nextgen([.][0-9]{6}[.][0-9]+)?-[0-9]+-g[0-9a-f]{6,10}$ # semver tags built nextgen branches after nextgen release tag.
      - ^v[0-9]+[.][0-9]+[.][0-9]+-nextgen([.][0-9]{6}[.][0-9]+)?$ # GA semver tags built from nextgen tags
      - ^v[0-9]+[.][0-9]+[.][0-9]+-nextgen$ # GA semver tags built from classic tags
      - ^v[1-9][0-9]+[.][0-9]+[.][0-9]+-[0-9]+-g[0-9a-f]{6,10}-nextgen$ # calendar-style nextgen tags built after a GA nextgen tag.
      - ^v[1-9][0-9]+[.][0-9]+[.][0-9]+-nextgen$ # calendar-style nextgen GA tags
  sync_pre_community: &sync_pre_community
    description: delivery community images for release branches.
    tags_regex:
      - ^release-[0-9]+[.][0-9]+(-beta[.][0-9]+)?$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-pre$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-beta[.][0-9]+[.]pre$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+[.]pre$
  sync_pre_community_semver_sha: &sync_pre_community_semver_sha
    description: delivery community images that tagged with semver tag images for branches.
    tags_regex:
      - ^v[0-9]+[.][0-9]+[.][0-9]+-pre(-[0-9]+-g[0-9a-f]+)$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-beta[.][0-9]+[.]pre(-[0-9]+-g[0-9a-f]+)$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+[.]pre(-[0-9]+-g[0-9a-f]+)$

  sync_pre_enterprise: &sync_pre_enterprise
    description: delivery the enterprise RC images.
    tags_regex:
      - ^(v[0-9]+[.][0-9]+[.][0-9]+-pre)-enterprise$
      - ^(v[0-9]+[.][0-9]+[.][0-9]+-beta[.][0-9]+[.]pre)-enterprise$
      - ^(v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+[.]pre)-enterprise$
    tag_regex_replace: "$1"
  sync_pre_community_to_enterprise_repo: &sync_pre_community_to_enterprise_repo
    description: delivery the community RC image to enterprise repos.
    tags_regex:
      - ^v[0-9]+[.][0-9]+[.][0-9]+-pre$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-beta[.][0-9]+[.]pre$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+[.]pre$
      - ^release-[0-9]+[.][0-9]+$
  sync_ga_community: &sync_ga_community
    description: delivery community images for GA images.
    tags_regex:
      - ^v[0-9]+[.][0-9]+[.][0-9]+$
      - ^v[0-9]+[.][0-9]+[.][0-9]+-(beta|rc|release)[.][0-9]+$
  sync_ga_community_fts: &sync_ga_community_fts
    description: delivery community FTS images for GA images.
    tags_regex:
      - ^v8[.]5[.]6-20260228-[0-9a-f]+$
  sync_ga_enterprise: &sync_ga_enterprise
    description: delivery the enterprise GA images.
    tags_regex:
      - ^(v[0-9]+[.][0-9]+[.][0-9]+)-enterprise$
      - ^(v[0-9]+[.][0-9]+[.][0-9]+-(beta|rc|release)[.][0-9]+)-enterprise$
    tag_regex_replace: "$1"
  sync_ga_community_to_enterprise_repo: &sync_ga_community_to_enterprise_repo
    <<: *sync_ga_community
    description: delivery the community GA image to enterprise repos.

image_copy_rules:
  us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/advanced-statefulset/image:
    - description: delivery the version images.
      tags_regex:
        - ^(v[0-9]+[.][0-9]+[.][0-9]+)(-.+)?$
      dest_repositories:
        - docker.io/pingcap/advanced-statefulset
        - gcr.io/pingcap-public/dbaas/advanced-statefulset
  us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/ticdc/image:
    - <<: *sync_trunk_community
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
        - docker.io/pingcap/ticdc
    - <<: *sync_ga_community
      dest_repositories:
        - docker.io/pingcap/ticdc
        - uhub.service.ucloud.cn/pingcap/ticdc
    - <<: *sync_pre_community_to_enterprise_repo
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
    - description: delivery classic release branch image tags
      tags_regex:
        - ^release-[0-9]+[.][0-9]+(-[0-9a-f]{7,10})?$
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
    - <<: *sync_pre_community_semver_sha
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
    - <<: *sync_ga_community_to_enterprise_repo
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
        - docker.io/pingcap/ticdc-enterprise
    - description: delviery fast hotfix images
      tags_regex:
        - ^v[0-9]+[.][0-9]+[.][0-9]+-release[.][0-9]+-[0-9]+-[0-9a-f]{6,}$
      dest_repositories:
        - gcr.io/pingcap-public/dbaas/ticdc
        - docker.io/pingcap/ticdc
  us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/tidb-operator/images/tidb-operator:
    - description: delivery the version images, exclude pre release types.
      tags_regex:
        - ^(v[0-9]+[.][0-9]+[.][0-9]+)(-(?!pre(\.|$))(?![0-9a-f]{7,}(?:_|$)).*)?$
      dest_repositories:
        - docker.io/pingcap/tidb-operator
        - gcr.io/pingcap-public/dbaas/tidb-operator
    - <<: *sync_trunk_community
      dest_repositories:
