  - us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/tidb-binlog/package

  # deprecated and removed in v9.0.0, use us-docker.pkg.dev/pingcap-testing-account/hub/pingcap/tiflow/images/sync-diff-inspector instead.
