name: Publish CD utils images
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dockerfiles/cd/utils/**/Dockerfile"
      - "dockerfiles/cd/utils/**/*.Dockerfile"
      - "dockerfiles/cd/utils/skaffold.yaml"

permissions:
  contents: read

jobs:
  skaffold:
    name: publish images with skaffold
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        module: [utils]

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: "0"
          fetch-tags: "true"

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup skaffold
        uses: heypigeonhq/setup-skaffold@3b1a0687de1b580d3879bf6b9d423255c9954587
        with:
          version: 2.16.0

      - name: Publish images
        working-directory: dockerfiles/cd/utils
        run: |
          skaffold build \
            --build-concurrency 1 \
            --cache-artifacts \
            --default-repo ghcr.io/pingcap-qe/cd/utils \
            --module ${{ matrix.module }}
