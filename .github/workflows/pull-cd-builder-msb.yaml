name: Build multi stage images
on:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-comment:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      task: ${{ steps.check.outputs.task }}
    steps:
      - id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const comment = context.payload.comment?.body ?? "";
            const match = comment.match(/^\/just\s+([A-Za-z0-9._-]+)$/);
            const allowedTasks = new Set([
              "all",
              "msb-tidb",
              "msb-pd",
              "msb-cdc",
              "msb-dm",
              "msb-tidb-dashboard",
              "msb-tidb-operator",
              "msb-ng-monitoring",
              "msb-tiflash",
              "msb-tikv",
            ]);

            if (!match || !allowedTasks.has(match[1])) {
              core.setOutput("should-run", "false");
              return;
            }

            core.setOutput("should-run", "true");
            core.setOutput("task", match[1]);

  just-build:
    needs: check-comment
    if: needs.check-comment.outputs.should-run == 'true'
    name: test building with multi stages
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Set up just tool
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b
        with:
          github-token: ${{ secrets.MY_GITHUB_TOKEN }}
          just-version: 1.34.0 # optional semver specification, otherwise latest

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run specific component build
        working-directory: dockerfiles
        run: |
          set -euo pipefail
          TASK="${{ needs.check-comment.outputs.task }}"
          if [ "$TASK" == "all" ]; then
            echo "Run all tasks"
            just msb-tidb
            just msb-pd
            just msb-cdc
            just msb-dm
            just msb-tidb-dashboard
            just msb-tidb-operator
            just msb-ng-monitoring
            just msb-tiflash
            just msb-tikv
          else
            echo "run Just task: $TASK"
            just "$TASK"
          fi

      - name: Comment on PR with results
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const { issue: { number: issue_number }, repo: { owner, repo } } = context;
            const task = '${{ needs.check-comment.outputs.task }}';

            github.rest.issues.createComment({
              issue_number,
              owner,
              repo,
              body: `✅ Task \`${task}\` completed successfully.`
            });
